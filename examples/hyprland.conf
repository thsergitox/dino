# dino — push-to-talk dictation
# Drop these lines into ~/.config/hypr/hyprland.conf and run `hyprctl reload`.

# If your API key is not exported in the Hyprland session, uncomment:
# env = OPENAI_API_KEY,sk-...

# Hold SUPER+V to dictate; release to transcribe and type the result.
bind  = SUPER, V, exec, dino start
bindr = SUPER, V, exec, dino stop

# --- Alternatives -------------------------------------------------------------

# One-shot toggle (tap to start, tap again to stop):
# bind = SUPER, V, exec, dino toggle

# Push-to-talk on a side mouse button (best ergonomics — try it):
# bind  = , mouse:276, exec, dino start
# bindr = , mouse:276, exec, dino stop
