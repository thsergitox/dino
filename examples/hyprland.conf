# dino — voice dictation TUI for Hyprland
# `dino setup` generates and appends the right block for your machine.
# This file is a reference if you want to write it manually.

# ─── Recommended: exec-once lifecycle ─────────────────────────────────────────
# dino starts with Hyprland and stays in a hidden special workspace; SUPER+Z
# toggles its visibility. The bind goes through a small toggle script so it
# self-heals — if dino isn't running (crash, no login since `dino setup`), the
# script spawns it before toggling.
#
# Replace `kitty` with your terminal — for foot use
# `foot --app-id=dino dino tui`, for ghostty `ghostty --class=dino -e dino tui`.

exec-once = kitty --class dino --override hide_window_decorations=yes dino tui

windowrule = workspace special:dino silent, match:class ^(dino)$
windowrule = float on, match:class ^(dino)$
windowrule = size 60% 50%, match:class ^(dino)$
windowrule = center 1, match:class ^(dino)$

bind = SUPER, Z, exec, ~/.config/dino/dino-toggle.sh

# ─── Alternative: lazy-spawn lifecycle ────────────────────────────────────────
# Same bind, but skip the exec-once line — dino is only spawned the first time
# you press SUPER+Z. Cheaper at login, ~1s cold start on first toggle.

# ─── Legacy CLI (v0.1 — push-to-talk, no TUI) ─────────────────────────────────
# Kept for users who don't want a persistent window.
# bind  = SUPER, V, exec, dino start
# bindr = SUPER, V, exec, dino stop
